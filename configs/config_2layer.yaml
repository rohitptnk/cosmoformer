experiment:
  seed: 42
  device: cuda

data:
  data_dir: ./data
  raw_dir: ./data/raw
  processed_dir: ./data/processed
  seq_len: 31
  num_workers: 4
  pin_memory: true

model:
  d_model: 512
  n_heads: 8
  d_ff: 2048
  dropout: 0.1
  pre_ln: true
  n_layers: 2
  predict_variance: True

training:
  epochs: 200
  batch_size: 64
  use_amp: true
  grad_clip: 1.0

optimizer:
  name: AdamW
  lr: 1e-4
  weight_decay: 1e-4

scheduler:
  name: cosine_with_warmup
  warmup_frac: 0.05
  min_lr: 1e-7

loss:
  type: heteroscedastic
  hetero:
    clamp_logvar: true
    logvar_clamp_min: -20.0
    logvar_clamp_max: 20.0

logging:
  use_mlflow: true
  mlflow:
    tracking_uri: file:./mlruns
    experiment_name: cosmoformer
    run_name: cosmoformer_2layer

checkpoint:
  checkpoint_dir: ./experiments/cosmoformer_2layer
  resume_from: null