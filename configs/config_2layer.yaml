description: "Multi-foreground transformer with 2 transformer layers trained on 10k dataset with varying synchrotron at 30GHz and 100GHz for 50 epochs."

experiment:
  seed: 42
  device: cpu

data:
  data_dir: ./data
  raw_dir: ./data/raw/10k_diff
  processed_dir: ./data/processed/10k_diff
  mixed1_name: mixed_64_10k_30GHz.npy
  mixed2_name: mixed_64_10k_100GHz.npy
  true_name: true_64_10k.npy
  fg1_name: fg_64_10k_30GHz.npy
  fg2_name: fg_64_10k_100GHz.npy
  seq_len: 127
  num_workers: 4
  pin_memory: true

logging:
  use_mlflow: true
  mlflow:
    tracking_uri: file:./mlruns
    experiment_name: cosmoformer
    run_name: cformer_2l_10k_diff_30GHz_100GHz_synch_50ep

checkpoint:
  checkpoint_dir: ./experiments/cformer_2l_10k_diff_30GHz_100GHz_synch_50ep
  resume_from: null

model:
  d_model: 512
  n_heads: 8
  d_ff: 2048
  dropout: 0.1
  pre_ln: true
  n_layers: 2
  predict_variance: True

training:
  epochs: 50
  batch_size: 64
  use_amp: true
  grad_clip: 1.0

optimizer:
  name: AdamW
  lr: 1e-4
  weight_decay: 1e-4

scheduler:
  name: cosine_with_warmup
  warmup_frac: 0.05
  min_lr: 1e-7

loss:
  type: heteroscedastic
  lambda_fg1: 1.0
  lambda_fg2: 1.0
  hetero:
    clamp_logvar: true
    logvar_clamp_min: -20.0
    logvar_clamp_max: 20.0

