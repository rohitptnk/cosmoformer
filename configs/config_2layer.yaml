description: "Multi-foreground transformer with 2 transformer layers trained on 10k dataset with s1, d1 and f1 combined together at 100GHz, 119GHz, 140GHz, 166GHz for 50 epochs."

experiment:
  seed: 42
  device: cpu

data:
  data_dir: ./data
  raw_dir: ./data/raw/10k_multifg
  processed_dir: ./data/processed/10k_multifg
  mixed1_name: mixed_64_10k_100GHz.npy
  mixed2_name: mixed_64_10k_119GHz.npy
  mixed3_name: mixed_64_10k_140GHz.npy
  mixed4_name: mixed_64_10k_166GHz.npy
  true_name: true_64_10k_100GHz.npy
  freq1_name: fg_64_10k_100GHz.npy
  freq2_name: fg_64_10k_119GHz.npy
  freq3_name: fg_64_10k_140GHz.npy
  freq4_name: fg_64_10k_166GHz.npy
  seq_len: 127
  num_workers: 4
  pin_memory: true

logging:
  use_mlflow: true
  mlflow:
    tracking_uri: file:./mlruns
    experiment_name: cosmoformer
    run_name: cformer_2l_10k_multifg_50ep

checkpoint:
  checkpoint_dir: ./experiments/cformer_2l_10k_multifg_50ep
  resume_from: null

model:
  d_model: 512
  n_heads: 8
  d_ff: 2048
  dropout: 0.1
  pre_ln: true
  n_layers: 2
  predict_variance: True

training:
  epochs: 50
  batch_size: 64
  use_amp: true
  grad_clip: 1.0

optimizer:
  name: AdamW
  lr: 1e-4
  weight_decay: 1e-4

scheduler:
  name: cosine_with_warmup
  warmup_frac: 0.05
  min_lr: 1e-7

loss:
  type: heteroscedastic
  lambda_freq1: 1.0
  lambda_freq2: 1.0
  lambda_freq3: 1.0
  lambda_freq4: 1.0
  hetero:
    clamp_logvar: true
    logvar_clamp_min: -20.0
    logvar_clamp_max: 20.0

